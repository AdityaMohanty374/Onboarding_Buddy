name: Retrieval Eval

# Runs the retrieval eval (search + blame history accuracy) on every push
# and PR, but only when files that could actually affect retrieval quality
# change — no point re-running this because you edited the README.
"on":
  push:
    branches: [main]
    paths:
      - "backend/git_tools.py"
      - "backend/main.py"
      - "backend/prompts.py"
      - "backend/eval/**"
  pull_request:
    paths:
      - "backend/git_tools.py"
      - "backend/main.py"
      - "backend/prompts.py"
      - "backend/eval/**"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run retrieval eval
        env:
          # The eval never calls the LLM — it only exercises git_tools.py
          # directly — but config.py requires this env var to exist at
          # import time, so a placeholder value is enough.
          GROQ_API_KEY: unused-in-eval
        run: python eval/run_eval.py

      # run_eval.py already exits non-zero on any failing case, so a failing
      # eval fails this job automatically — no extra parsing needed here.
